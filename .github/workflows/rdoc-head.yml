name: RDoc HEAD

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true
      - name: Cache vendored repositories
        uses: actions/cache@v4
        with:
          path: |
            vendor/minitest
            vendor/rails
          key: ${{ runner.os }}-vendored-repos-v1-${{ hashFiles('Rakefile') }}
          restore-keys: |
            ${{ runner.os }}-vendored-repos-v1-
      - run: bundle config unset deployment
      - name: Install appraised bundle
        run: bundle exec appraisal rdoc_head bundle install
      - name: Run tests
        run: bundle exec appraisal rdoc_head rake test
      - name: Validate markdown output (GFM)
        run: bundle exec appraisal rdoc_head rake markdown:validate
