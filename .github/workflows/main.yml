name: Ruby

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  compatibility:
    name: Tests / Ruby ${{ matrix.ruby-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ["3.3", "3.4", "4.0"]

    steps:
      - uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
      - name: Cache vendored repositories
        uses: actions/cache@v4
        with:
          path: |
            vendor/minitest
            vendor/rails
          key: ${{ runner.os }}-vendored-repos-v1-${{ hashFiles('Rakefile') }}
          restore-keys: |
            ${{ runner.os }}-vendored-repos-v1-
      - name: Run tests
        run: bundle exec rake test

  quality:
    name: Quality and generated docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true
      - name: Cache vendored repositories
        uses: actions/cache@v4
        with:
          path: |
            vendor/minitest
            vendor/rails
          key: ${{ runner.os }}-vendored-repos-v1-${{ hashFiles('Rakefile') }}
          restore-keys: |
            ${{ runner.os }}-vendored-repos-v1-
      - run: bundle config unset deployment
      - name: Standard Ruby
        uses: standardrb/standard-ruby-action@v1
      - name: Lint markdown ERB templates
        run: bundle exec rake erb:lint
      - name: YARD Lint
        run: bundle exec yard-lint lib/
      - name: Validate markdown output (GFM)
        run: bundle exec rake markdown:validate
