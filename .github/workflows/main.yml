name: Ruby

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  compatibility:
    name: Tests / RDoc ${{ matrix.rdoc.version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rdoc:
          - version: "7"
            appraisal: rdoc_7
          - version: "8"
            appraisal: rdoc_8

    steps:
      - uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true
      - name: Cache vendored repositories
        uses: actions/cache@v4
        with:
          path: |
            vendor/minitest
            vendor/rails
          key: ${{ runner.os }}-vendored-repos-v1-${{ hashFiles('Rakefile') }}
          restore-keys: |
            ${{ runner.os }}-vendored-repos-v1-
      - run: bundle config unset deployment
      - name: Install appraised bundle
        run: bundle exec appraisal ${{ matrix.rdoc.appraisal }} bundle install
      - name: Run tests
        run: bundle exec appraisal ${{ matrix.rdoc.appraisal }} rake test

  quality:
    name: Quality and generated docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true
      - name: Cache vendored repositories
        uses: actions/cache@v4
        with:
          path: |
            vendor/minitest
            vendor/rails
          key: ${{ runner.os }}-vendored-repos-v1-${{ hashFiles('Rakefile') }}
          restore-keys: |
            ${{ runner.os }}-vendored-repos-v1-
      - run: bundle config unset deployment
      - name: Standard Ruby
        uses: standardrb/standard-ruby-action@v1
      - name: Lint markdown ERB templates
        run: bundle exec rake erb:lint
      - name: YARD Lint
        run: bundle exec yard-lint lib/
      - name: Validate markdown output (GFM)
        run: bundle exec rake markdown:validate

  rdoc8-generated-docs:
    name: Generated docs / RDoc 8
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true
      - name: Cache vendored repositories
        uses: actions/cache@v4
        with:
          path: |
            vendor/minitest
            vendor/rails
          key: ${{ runner.os }}-vendored-repos-v1-${{ hashFiles('Rakefile') }}
          restore-keys: |
            ${{ runner.os }}-vendored-repos-v1-
      - run: bundle config unset deployment
      - name: Install appraised bundle
        run: bundle exec appraisal rdoc_8 bundle install
      - name: Validate markdown output (GFM)
        run: bundle exec appraisal rdoc_8 rake markdown:validate
