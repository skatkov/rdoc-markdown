usage: opensource

integration:
  name: minitest

includes:
  - lib
  - test

requires:
  - ./test/support/mutant_setup.rb

matcher:
  subjects:
    - RDoc::Generator::Markdown#anchor
    - RDoc::Generator::Markdown#build_class_docs
    - RDoc::Generator::Markdown#class_content_score
    - RDoc::Generator::Markdown#class_doc_for
    - RDoc::Generator::Markdown#class_dir
    - RDoc::Generator::Markdown#display_name
    - RDoc::Generator::Markdown#legacy_paths_for
    - RDoc::Generator::Markdown#merge_method_signature_arguments
    - RDoc::Generator::Markdown#method_signature
    - RDoc::Generator::Markdown#normalized_method_params
    - RDoc::Generator::Markdown#normalized_full_name
    - RDoc::Generator::Markdown#output_path_for
    - RDoc::Generator::Markdown#page_output_path
    - RDoc::Generator::Markdown#extract_parameter_name
    - RDoc::Generator::Markdown#signature_part_mentions_name?
    - RDoc::Generator::Markdown#split_signature_arguments_and_suffix
    - RDoc::Generator::Markdown#split_signature_list
    - RDoc::Generator::Markdown#setup
    - RDoc::Generator::Markdown#synthetic_full_name?
    - RDoc::Generator::Markdown#turn_to_path
